<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- light rounded background -->
  <rect width="120" height="120" rx="24" fill="#f0f4f8"/>
  <rect width="120" height="120" rx="24" stroke="#dde3ec" stroke-width="1.5"/>

  <!-- 00 · both hollow -->
  <rect x="16" y="70" width="16" height="8"  rx="2.5" fill="none" stroke="#7a9ab0" stroke-width="1.4"/>
  <rect x="16" y="82" width="16" height="8"  rx="2.5" fill="none" stroke="#7a9ab0" stroke-width="1.4"/>

  <!-- 01 · top hollow, bottom filled -->
  <rect x="40" y="62" width="16" height="12" rx="3"   fill="none" stroke="#4b7a9a" stroke-width="1.5"/>
  <rect x="40" y="78" width="16" height="12" rx="3"   fill="#4b7a9a"/>

  <!-- 11 · both filled -->
  <rect x="64" y="54" width="16" height="16" rx="3.5" fill="#3a6080"/>
  <rect x="64" y="74" width="16" height="16" rx="3.5" fill="#3a6080"/>

  <!-- 10 · top filled, bottom hollow -->
  <rect x="88" y="46" width="16" height="20" rx="4"   fill="#1e3a50"/>
  <rect x="88" y="70" width="16" height="20" rx="4"   fill="none" stroke="#1e3a50" stroke-width="1.6"/>
</svg>
