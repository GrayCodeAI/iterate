<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4ade80" stop-opacity="0.35"/>
      <stop offset="40%"  stop-color="#a3e635" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <!--
    Each state = two stacked rects (top = bit1, bottom = bit0)
    filled rect  = 1  (solid, colored)
    outline rect = 0  (hollow, dim border)

    State  bit1 bit0   top    bottom
    ─────────────────────────────────
    00      0    0    hollow  hollow
    01      0    1    hollow  filled
    11      1    1    filled  filled
    10      1    0    filled  hollow

    Sizes escalate: 8→12→17→23px wide, proportional height
    Arranged in an arc rising left→right
  -->

  <!-- ── STATE 00 — smallest, leftmost, dim ── -->
  <!-- top bit (0) = hollow -->
  <rect x="28" y="62" width="10" height="7"  rx="2" stroke="#2d3f55" stroke-width="1.2" fill="none"/>
  <!-- bottom bit (0) = hollow -->
  <rect x="28" y="72" width="10" height="7"  rx="2" stroke="#2d3f55" stroke-width="1.2" fill="none"/>

  <!-- ── STATE 01 — second ── -->
  <!-- top bit (0) = hollow -->
  <rect x="46" y="54" width="14" height="9"  rx="2.5" stroke="#3d5a40" stroke-width="1.3" fill="none"/>
  <!-- bottom bit (1) = filled -->
  <rect x="46" y="66" width="14" height="9"  rx="2.5" fill="#4ade80" opacity="0.55"/>

  <!-- ── STATE 11 — third, both filled ── -->
  <!-- top bit (1) = filled -->
  <rect x="69" y="43" width="19" height="12" rx="3" fill="#a3e635" opacity="0.75"/>
  <!-- bottom bit (1) = filled -->
  <rect x="69" y="58" width="19" height="12" rx="3" fill="#a3e635" opacity="0.75"/>

  <!-- ── STATE 10 — largest, rightmost, brightest ── -->
  <!-- top bit (1) = filled, full color -->
  <rect x="98" y="28" width="26" height="17" rx="4" fill="url(#grad)"/>
  <!-- bottom bit (0) = hollow, accent border -->
  <rect x="98" y="49" width="26" height="17" rx="4" stroke="#2dd4bf" stroke-width="1.8" fill="none"/>

  <!-- ── WORDMARK ── -->
  <text x="28" y="118"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-size="52" font-weight="800" letter-spacing="-2.5"
    fill="#f1f5f9">Gray</text>

  <text x="168" y="118"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-size="52" font-weight="300" letter-spacing="-2"
    fill="#4b5e78">Code</text>
</svg>
