<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrayCode — Brand</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080d1a; font-family: Inter, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 5rem 2rem; gap: 2rem; }
    .lbl { font-family: 'JetBrains Mono', monospace; font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; color: #2d3f55; margin-bottom: 1.25rem; }
    .card { background: #0a0f1e; border: 1px solid #1a2540; border-radius: 20px; padding: 3rem 4rem; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 600px; }
    .row { display: flex; gap: 1.5rem; width: 100%; max-width: 600px; }
    .row .card { flex: 1; padding: 2rem; }
    .light { background: #f1f5f9; border-radius: 12px; padding: 1.5rem; }
  </style>
</head>
<body>

  <div class="card">
    <div class="lbl">Wordmark</div>
    <img src="graycodeai-logo.svg" width="460" style="max-width:100%" alt="GrayCode">
  </div>

  <div class="row">
    <div class="card">
      <div class="lbl">Icon · 96px</div>
      <img src="graycodeai-icon.svg" width="96" alt="icon">
    </div>
    <div class="card">
      <div class="lbl">Icon · 56px</div>
      <img src="graycodeai-icon.svg" width="56" alt="icon sm">
    </div>
    <div class="card">
      <div class="lbl">Icon · light</div>
      <div class="light"><img src="graycodeai-icon.svg" width="72" alt="icon light"></div>
    </div>
  </div>

</body>
</html>
