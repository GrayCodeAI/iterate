<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&amp;display=swap');
    </style>
  </defs>

  <!--
    4 states, bottom-aligned at y=54, gap=4px between top/bottom rect in each pair
    Widths all 22px, heights: 00=10 01=14 11=18 10=22
    Gap between groups: 12px
    Total: 4*22 + 3*12 = 124px, centered in 300px → start x = 88
  -->

  <!-- 00 · both hollow -->
  <rect x="88"  y="30" width="22" height="10" rx="3"   fill="none" stroke="#3d5570" stroke-width="1.5"/>
  <rect x="88"  y="44" width="22" height="10" rx="3"   fill="none" stroke="#3d5570" stroke-width="1.5"/>

  <!-- 01 · top hollow, bottom filled -->
  <rect x="122" y="22" width="22" height="14" rx="3.5" fill="none" stroke="#3d5268" stroke-width="1.5"/>
  <rect x="122" y="40" width="22" height="14" rx="3.5" fill="#3d5268"/>

  <!-- 11 · both filled -->
  <rect x="156" y="14" width="22" height="18" rx="4"   fill="#607d93"/>
  <rect x="156" y="36" width="22" height="18" rx="4"   fill="#607d93"/>

  <!-- 10 · top filled, bottom hollow -->
  <rect x="190" y="6"  width="22" height="22" rx="5"   fill="#c0d0e0"/>
  <rect x="190" y="32" width="22" height="22" rx="5"   fill="none" stroke="#c0d0e0" stroke-width="1.8"/>

  <!-- wordmark -->
  <text
    x="150" y="80"
    text-anchor="middle"
    font-family="'Space Grotesk', system-ui, sans-serif"
    font-size="26" font-weight="700" letter-spacing="-0.8"
    fill="#c8d8e8">Gray<tspan font-weight="300" fill="#7a9ab0">Code</tspan></text>

</svg>
