<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>

  <rect width="120" height="120" rx="26" fill="#080d1a"/>
  <rect width="120" height="120" rx="26" stroke="#1a2540" stroke-width="1.5"/>

  <!-- same 4-state escalating pattern, centered -->
  <!-- 00 -->
  <rect x="14" y="62" width="12" height="8"  rx="2"   stroke="#253040" stroke-width="1.2" fill="none"/>
  <rect x="14" y="73" width="12" height="8"  rx="2"   stroke="#253040" stroke-width="1.2" fill="none"/>

  <!-- 01 -->
  <rect x="32" y="54" width="16" height="10" rx="2.5" stroke="#2d5c38" stroke-width="1.3" fill="none"/>
  <rect x="32" y="67" width="16" height="10" rx="2.5" fill="#4ade80" opacity="0.5"/>

  <!-- 11 -->
  <rect x="55" y="43" width="21" height="13" rx="3"   fill="#a3e635" opacity="0.7"/>
  <rect x="55" y="59" width="21" height="13" rx="3"   fill="#a3e635" opacity="0.7"/>

  <!-- 10 — largest, brightest -->
  <rect x="83" y="28" width="28" height="18" rx="4.5" fill="url(#g)"/>
  <rect x="83" y="50" width="28" height="18" rx="4.5" stroke="#2dd4bf" stroke-width="1.8" fill="none"/>
</svg>
