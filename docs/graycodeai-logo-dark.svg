<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&amp;display=swap');
    </style>
  </defs>

  <!-- 00 · both hollow -->
  <rect x="88"  y="30" width="22" height="10" rx="3"   fill="none" stroke="#7a9ab0" stroke-width="1.5"/>
  <rect x="88"  y="44" width="22" height="10" rx="3"   fill="none" stroke="#7a9ab0" stroke-width="1.5"/>

  <!-- 01 · top hollow, bottom filled -->
  <rect x="122" y="22" width="22" height="14" rx="3.5" fill="none" stroke="#4b7a9a" stroke-width="1.5"/>
  <rect x="122" y="40" width="22" height="14" rx="3.5" fill="#4b7a9a"/>

  <!-- 11 · both filled -->
  <rect x="156" y="14" width="22" height="18" rx="4"   fill="#3a6080"/>
  <rect x="156" y="36" width="22" height="18" rx="4"   fill="#3a6080"/>

  <!-- 10 · top filled, bottom hollow -->
  <rect x="190" y="6"  width="22" height="22" rx="5"   fill="#1e3a50"/>
  <rect x="190" y="32" width="22" height="22" rx="5"   fill="none" stroke="#1e3a50" stroke-width="1.8"/>

  <!-- wordmark for light backgrounds -->
  <text
    x="150" y="80"
    text-anchor="middle"
    font-family="'Space Grotesk', system-ui, sans-serif"
    font-size="26" font-weight="700" letter-spacing="-0.8"
    fill="#2d5068">Gray<tspan font-weight="300" fill="#4b7a9a">Code</tspan></text>

</svg>
