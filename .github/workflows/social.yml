name: social

on:
  schedule:
    - cron: '0 */4 * * *'   # Every 4 hours (offset from evolve.yml)
  workflow_dispatch:

jobs:
  social:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      discussions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build iterate
        run: go build -o iterate ./cmd/iterate

      - name: Configure git
        run: |
          git config user.name  "iterate[bot]"
          git config user.email "iterate@users.noreply.github.com"

      - name: Run social session
        env:
          OLLAMA_BASE_URL:   ${{ vars.OLLAMA_BASE_URL || 'http://100.102.194.103:11434' }}
          ITERATE_MODEL:     ${{ vars.ITERATE_MODEL || 'qwen3-coder:30b' }}
          REPO:              ${{ github.repository }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
        run: |
          go build -o iterate ./cmd/iterate
          ./iterate \
            --social \
            --repo . \
            --gh-owner ${{ github.repository_owner }} \
            --gh-repo  ${{ github.event.repository.name }}

      - name: Push memory files if changed
        run: |
          git add memory/ || true
          git diff --staged --quiet || git commit -m "chore: update memory files"
          git push origin main || true
