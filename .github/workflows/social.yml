name: iterate social session

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours (offset from evolve)
  workflow_dispatch:

permissions:
  contents: write
  discussions: write
  issues: write

jobs:
  social:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Build iterate
        run: go build ./cmd/iterate

      - name: Run social session
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/social.sh

      - name: Commit learnings
        run: |
          git config user.name "iterate[bot]"
          git config user.email "iterate@users.noreply.github.com"
          if [[ -n $(git status -s memory/social_learnings.jsonl memory/active_social_learnings.md) ]]; then
            git add memory/social_learnings.jsonl memory/active_social_learnings.md
            git commit -m "iterate: social session learnings $(date -u +'%Y-%m-%d %H:%M:%S')" || true
            git push || true
          fi
