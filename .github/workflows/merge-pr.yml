name: merge-pr

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Merge PR #69
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          gh pr merge 69 --squash --delete-branch --admin
