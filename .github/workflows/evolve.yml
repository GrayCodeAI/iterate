name: iterate evolution

on:
  schedule:
    - cron: '0 */8 * * *'  # Every 8 hours
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: GrayCodeAI/iteragent
          path: iteragent-pkg
          fetch-depth: 0

      - uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Setup iteragent path
        run: cd /home/runner/work && ln -s iterate/iteragent-pkg iteragent

      - name: Build iterate
        run: go build ./cmd/iterate

      - name: Run evolution loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/evolve.sh

      - name: Push changes
        run: |
          git config user.name "iterate[bot]"
          git config user.email "iterate@users.noreply.github.com"
          if [[ -n $(git status -s) ]]; then
            git add -A
            git commit -m "iterate: auto-evolution session $(date -u +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
