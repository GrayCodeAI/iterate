name: iterate evolution

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'  # Every 4 hours
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: GrayCodeAI/iteragent
          path: iteragent-pkg
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup iteragent path
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p ..
          cp -r iteragent-pkg ../iteragent

      - name: Configure git
        run: |
          git config user.name "iterate[bot]"
          git config user.email "iterate@users.noreply.github.com"

      - name: Build iterate
        run: go build ./cmd/iterate

      - name: Run evolution loop
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_BASE_URL: https://opencode.ai/zen/go/v1
          ITERATE_PROVIDER: opencode
          ITERATE_MODEL: kimi-k2.5
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          bash scripts/evolution/evolve.sh

      - name: Show evolution log
        if: always()
        run: cat .iterate/evolution.log 2>/dev/null || echo "(no log file)"

      - name: Push changes
        run: |
          if [[ -n $(git status -s) ]]; then
            git add -A
            git commit -m "iterate: auto-evolution session $(date -u +'%Y-%m-%d %H:%M:%S')"
          fi
          git pull --rebase origin main
          git push
