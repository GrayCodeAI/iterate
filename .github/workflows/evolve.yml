name: iterate evolution

on:
  schedule:
    - cron: '0 0,4,8,12,16,20 * * *'  # Every 4 hours
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/checkout@v4
        with:
          repository: GrayCodeAI/iteragent
          path: iteragent-pkg
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false

      - name: Setup iteragent path
        run: |
          cd $GITHUB_WORKSPACE
          mkdir -p ..
          cp -r iteragent-pkg ../iteragent

      - name: Configure git
        run: |
          git config user.name "iterate[bot]"
          git config user.email "iterate@users.noreply.github.com"

      - name: Install opencode CLI
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Configure opencode auth
        run: |
          mkdir -p ~/.local/share/opencode
          echo '{"opencode-go":{"type":"api","key":"${{ secrets.OPENCODE_API_KEY }}"}}' > ~/.local/share/opencode/auth.json
          opencode run --model opencode/mimo-v2-pro-free "say hi" 2>&1 | head -5 || echo "opencode test call failed"

      - name: Build iterate
        run: go build ./cmd/iterate

      - name: Run evolution loop
        env:
          ITERATE_PROVIDER: opencode-cli
          ITERATE_MODEL: mimo-v2-pro-free
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          which opencode || echo "opencode not found in PATH"
          opencode --version || echo "opencode version check failed"
          bash scripts/evolution/evolve.sh 2>&1

      - name: Show evolution log
        if: always()
        run: cat .iterate/evolution.log 2>/dev/null || echo "(no log file)"

      - name: Push changes
        run: |
          if [[ -n $(git status -s) ]]; then
            git add -A
            git commit -m "iterate: auto-evolution session $(date -u +'%Y-%m-%d %H:%M:%S')"
          fi
          git pull --rebase origin main
          git push
