name: evolve

on:
  schedule:
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install mutation testing
        run: go install github.com/zimmski/go-mutesting/cmd/go-mutesting@latest || true

      - name: Build iterate
        run: go build -o iterate ./cmd/iterate

      - name: Build site generator
        run: go build -o build_site ./cmd/build_site

      - name: Configure git
        run: |
          git config user.name  "iterate[bot]"
          git config user.email "iterate@users.noreply.github.com"

      - name: Run evolution session
        env:
          ITERATE_PROVIDER:  ${{ vars.ITERATE_PROVIDER || 'anthropic' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ITERATE_MODEL:     ${{ vars.ITERATE_MODEL }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./iterate \
            --repo . \
            --gh-owner ${{ github.repository_owner }} \
            --gh-repo  ${{ github.event.repository.name }} \
            --issue-limit 5 \
            --reply-issues

      - name: Rebuild journey site
        run: ./build_site .

      - name: Push all changes
        run: |
          git add -A
          git diff --staged --quiet || git push origin main

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy-pages:
    needs: evolve
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
