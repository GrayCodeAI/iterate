run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
  disable:
    - gocritic
    - revive
    - gosec
    - funlen
    - lll

linters-settings:
  errcheck:
    ignore: fmt:.*,io/fs:PathError

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
